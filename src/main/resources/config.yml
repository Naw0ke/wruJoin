settings:
  join-message:
    type: ACTIONBAR # types: ACTIONBAR, CHAT
    message: "<dark_gray>[<green>+<dark_gray>] <gray><player> <white><uniquejoin>"
  quit-message:
    type: ACTIONBAR
    message: "<dark_gray>[<red>-<dark_gray>] <gray><player>"

  title:
    enabled: true
    title: "<#D36E97><bold>Welcome, <player>!"
    subtitle: "<#FFA8CB><player> <white>have a good time!"

  sound:
    enabled: true
    sound: "entity.player.levelup"
    pitch: 2.0

  vanish-check: true # If the player is in vanish mode, no join/quit message will be sent.

messages:
  no-permission: "<dark_gray>-> <red>You do not have permission to use this command!"
  unknown-command: "<dark_gray>-> <red>Unknown command."
  reloaded: "<dark_gray>-> <green>Reloaded the config."